<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>La Poción</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(
        rgba(0, 0, 0, 0.3),
        rgba(0, 0, 0, 0.3)
      ), url('images/background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #333;
    }

    .hero {
      text-align: center;
      padding: 80px 20px 40px;
      color: white;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 40px 20px;
    }

    .product {
      background: white;
      border-radius: 20px;
      padding: 20px;
      width: 250px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      border-radius: 12px;
    }

    .product h3 {
      margin: 15px 0 5px;
    }

    .product p {
      font-weight: bold;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: #ff914d;
      color: white;
      border-radius: 20px;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <section class="hero">
    <h1>La Poción</h1>
    <p>La magia está en los ingredientes ✨</p>
  </section>

  <section class="products">

    <div class="product">
      <img src="images/product1.jpg" alt="Producto 1">
      <h3>Box 4 Shots</h3>
      <p>$20</p>
      <a href="#" class="btn">Comprar</a>
    </div>

    <div class="product">
      <img src="images/product2.jpg" alt="Producto 2">
      <h3>Box 7 Shots</h3>
      <p>$35</p>
      <a href="#" class="btn">Comprar</a>
    </div>

    <div class="product">
      <img src="images/product3.jpg" alt="Producto 3">
      <h3>Box 14 Shots</h3>
      <p>$60</p>
      <a href="#" class="btn">Comprar</a>
    </div>

  </section>

</body>
</html>
