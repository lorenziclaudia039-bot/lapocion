<script>
  function actualizarEntrega() {
    const entregaTipo = document.getElementById("entregaTipo").value;
    const deliveryInfoBox = document.getElementById("deliveryInfoBox");
    const deliveryLabel = document.getElementById("deliveryLabel");
    const lugarEntrega = document.getElementById("lugarEntrega");
    const deliveryHelpText = document.getElementById("deliveryHelpText");

    if (!entregaTipo) {
      deliveryInfoBox.style.display = "none";
      lugarEntrega.value = "";
      lugarEntrega.placeholder = "";
      deliveryHelpText.textContent = "";
      return;
    }

    deliveryInfoBox.style.display = "block";

    if (entregaTipo === "Pickup en Montehiedra Mall") {
      deliveryLabel.textContent = "Punto de entrega";
      lugarEntrega.value = "Montehiedra Mall";
      lugarEntrega.placeholder = "Montehiedra Mall";
      deliveryHelpText.textContent = "Las entregas en pickup serán los lunes de 3:00 p.m. a 6:00 p.m. en Montehiedra Mall.";
    } else if (entregaTipo === "Envío por correo") {
      deliveryLabel.textContent = "Dirección de envío";
      lugarEntrega.value = "";
      lugarEntrega.placeholder = "Escribe tu dirección completa";
      deliveryHelpText.textContent = "Los envíos por correo tardan aproximadamente de 48 a 72 horas.";
    }
  }

  function resetEntrega() {
    setTimeout(() => {
      const deliveryInfoBox = document.getElementById("deliveryInfoBox");
      const deliveryHelpText = document.getElementById("deliveryHelpText");
      const lugarEntrega = document.getElementById("lugarEntrega");

      deliveryInfoBox.style.display = "none";
      deliveryHelpText.textContent = "";
      lugarEntrega.value = "";
      lugarEntrega.placeholder = "";
    }, 0);
  }

  function enviarJugoWhatsApp() {
    const numeroWhatsApp = "17874226548";

    const nombre = document.getElementById("nombre").value.trim();
    const telefono = document.getElementById("telefono").value.trim();
    const tamano = document.getElementById("tamano").value;
    const cantidad = document.getElementById("cantidad").value;
    const extraIngredient = document.getElementById("extraIngredient").value.trim();
    const entregaTipo = document.getElementById("entregaTipo").value;
    const fechaEntrega = document.getElementById("fechaEntrega").value;
    const lugarEntrega = document.getElementById("lugarEntrega").value.trim();
    const notas = document.getElementById("notas").value.trim();

    const ingredientesSeleccionados = Array.from(
      document.querySelectorAll('.ingredients-checklist input[type="checkbox"]:checked')
    ).map(item => item.value);

    if (!nombre) {
      alert("Por favor, escribe tu nombre.");
      return;
    }

    if (!tamano) {
      alert("Por favor, selecciona un tamaño.");
      return;
    }

    if (!cantidad) {
      alert("Por favor, selecciona la cantidad.");
      return;
    }

    if (ingredientesSeleccionados.length === 0 && !extraIngredient) {
      alert("Por favor, selecciona al menos un ingrediente o añade otro ingrediente.");
      return;
    }

    if (!entregaTipo) {
      alert("Por favor, selecciona un método de entrega.");
      return;
    }

    if (entregaTipo === "Envío por correo" && !lugarEntrega) {
      alert("Por favor, escribe la dirección de envío.");
      return;
    }

    let mensaje = "Hola, quiero crear mi propio jugo en La Poción.%0A%0A";
    mensaje += "*Nombre:* " + nombre + "%0A";

    if (telefono) {
      mensaje += "*Teléfono:* " + telefono + "%0A";
    }

    mensaje += "*Tamaño:* " + tamano + "%0A";
    mensaje += "*Cantidad:* " + cantidad + "%0A";

    if (ingredientesSeleccionados.length > 0) {
      mensaje += "*Ingredientes seleccionados:* " + ingredientesSeleccionados.join(", ") + "%0A";
    }

    if (extraIngredient) {
      mensaje += "*Otro ingrediente:* " + extraIngredient + "%0A";
    }

    mensaje += "*Método de entrega:* " + entregaTipo + "%0A";

    if (entregaTipo === "Pickup en Montehiedra Mall") {
      mensaje += "*Lugar de entrega:* Montehiedra Mall%0A";
      mensaje += "*Horario de pickup:* Lunes de 3:00 p.m. a 6:00 p.m.%0A";
    }

    if (entregaTipo === "Envío por correo") {
      mensaje += "*Dirección de envío:* " + lugarEntrega + "%0A";
      mensaje += "*Tiempo estimado de entrega:* 48 a 72 horas%0A";
    }

    if (fechaEntrega) {
      mensaje += "*Fecha deseada:* " + fechaEntrega + "%0A";
    }

    if (notas) {
      mensaje += "*Notas adicionales:* " + notas + "%0A";
    }

    mensaje += "%0AGracias.";

    const url = "https://wa.me/" + numeroWhatsApp + "?text=" + mensaje;
    window.open(url, "_blank");
  }
</script>
