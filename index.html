<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>La Poción | Jugos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f4ef;
      color: #3e2f26;
    }

    header {
      background: #dbe7d3;
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    section {
      padding: 40px 20px;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    select, input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #355e3b;
      color: white;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
    }

    button:hover {
      background: #2b4b30;
    }

    .info {
      text-align: center;
      font-size: 0.95rem;
      margin-top: 20px;
      color: #6a5b4f;
    }

  </style>
</head>

<body>

<header>
  <h1>La Poción</h1>
  <p>Jugos que se sienten bien ✨</p>
</header>

<section>

  <div class="card">
    <h2>Ordena tu jugo</h2>

    <input id="name" placeholder="Tu nombre">

    <select id="size">
      <option value="">Selecciona tamaño</option>
      <option value="12 oz - $12">12 oz - $12</option>
      <option value="16 oz - $15">16 oz - $15</option>
      <option value="24 oz - $18">24 oz - $18</option>
    </select>

    <textarea id="ingredients" placeholder="Escoge hasta 3 ingredientes (incluidos). Ej: jengibre, limón, china"></textarea>

    <textarea id="extra" placeholder="Ingredientes adicionales (+$2 cada uno)"></textarea>

    <button onclick="sendOrder()">Enviar pedido por WhatsApp</button>

    <p class="info">
      Incluye hasta 3 ingredientes. <br>
      Ingredientes extra desde $2. <br><br>
      Entregas todos los jueves en Montehiedra <br>
      de 3:00 pm a 6:00 pm
    </p>

  </div>

</section>

<script>
  const phone = "17874324865"; // cambia si quieres

  function sendOrder() {
    let name = document.getElementById("name").value;
    let size = document.getElementById("size").value;
    let ingredients = document.getElementById("ingredients").value;
    let extra = document.getElementById("extra").value;

    let msg = `Hola, quiero ordenar un jugo en La Poción.%0A%0A`;
    msg += `Nombre: ${name}%0A`;
    msg += `Tamaño: ${size}%0A`;
    msg += `Ingredientes (incluidos): ${ingredients}%0A`;

    if (extra.trim() !== "") {
      msg += `Ingredientes extra: ${extra}%0A`;
    }

    msg += `%0AEntrega: Jueves en Montehiedra (3pm - 6pm)`;

    window.open(`https://wa.me/${phone}?text=${msg}`, "_blank");
  }
</script>

</body>
</html>
